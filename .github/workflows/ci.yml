# CI gate for IATIS (audit item C3).
#
# Three checks, ordered fastest-first so failures surface cheaply:
#   1. ruff  — gated on E9 (syntax errors) + F821 (undefined names) only.
#              The wider style backlog (~330 findings, audit item M4) is
#              deliberately NOT gated yet; tighten --select as it's paid down.
#   2. pytest — the full 374+ suite. It is hermetic by design
#              (tests/conftest.py blocks real sockets and strips real
#              credentials), so no secrets are needed here.
#   3. pip-audit — known-vulnerability scan of the installed environment.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff pip-audit

      - name: Ruff (syntax errors + undefined names)
        run: ruff check . --select E9,F821

      - name: Run test suite
        run: pytest tests/ -q

      - name: pip-audit (known vulnerabilities)
        run: pip-audit
