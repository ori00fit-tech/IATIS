confluence:
  min_engines_agreeing: 2
  min_score_to_trade: 58
  # Axis-8 gate (philosophy audit): at least this fraction of the ENABLED
  # panel's weight must produce an informative (non-NEUTRAL, above the
  # conviction threshold) vote — agreeing or dissenting — for confluence
  # to mean anything. Prevents the 2-of-4 quorum from silently degenerating
  # into "the only two fed engines co-signed" when the rest of the panel
  # is mute (e.g. a data-starved NNFX). 0.0 disables the gate.
  # Calibrated at 0.6: the observed live failure mode (NNFX+Wyckoff mute,
  # only SMC+PriceAction speaking) is ~57% of enabled weight and must FAIL;
  # any healthy mix that includes a speaking NNFX is >=60% and passes.
  # NNFX-NEUTRAL-with-SMC+PA-only also fails by design: no trend baseline,
  # no trend trade.
  min_informative_weight_share: 0.6
  weights:
    divergence: 0.0606
    ict: 0.0657
    macro: 0.0
    market_structure: 0.0859
    nnfx: 0.2273
    price_action: 0.1869
    quant: 0.0707
    sentiment: 0.0303
    smc: 0.202
    wyckoff: 0.0707
data:
  # 3000 H1 bars → ~750 resampled H4 bars and ~125 resampled D1 bars.
  # The Twelve Data Free plan serves H4/D1 as resamples of the H1 fetch
  # (core/data_loader.py), so this depth is what feeds NNFX (needs 210+
  # decision-TF bars for EMA200) and the MTF D1 gate (needs 50+ D1 bars).
  # At the previous 500, both were silently starved in live operation —
  # see docs/PHILOSOPHY_AUDIT_2026-07_ADDENDUM_LIVE.md. Free-plan max per
  # request is 5000; cost is 1 credit per request regardless of size.
  bars_to_load: 3000
  # Valid values: twelve_data | ctrader | injected (backtests only).
  # synthetic is disallowed under system.mode=live — scheduler.py's main()
  # refuses to start rather than trade on fabricated bars (see the guard
  # right after the TWELVE_DATA_API_KEY check there). Tests/backtests may
  # still pass source=synthetic directly to run_pipeline()/run_once() —
  # that's an intentional, separate hermetic-test path, not this guard.
  source: twelve_data
  symbol: EURUSD
  # Decision timeframe = first entry. H4-primary setup: engine votes,
  # regime, MQS and risk math run on 4-hour bars; D1 confirms the trend
  # via the MTF gate (H4 signal vs D1 EMA20/50+ADX) and H1 stays fetched
  # as auxiliary timing context. Telegram alerts dedup per decision bar,
  # so a 2-hourly scheduler still sends at most one alert per H4 candle.
  timeframes:
  - H4
  - D1
  - H1
  twelve_data_symbols:
  - enabled: true
    internal: EURUSD
    min_score: 60
    rr: 2.0
    symbol: EUR/USD
  - enabled: true
    internal: GBPUSD
    min_score: 58
    rr: 2.0
    symbol: GBP/USD
  - enabled: true
    internal: USDJPY
    min_score: 58
    rr: 2.0
    symbol: USD/JPY
  - enabled: true
    internal: USDCHF
    min_score: 58
    rr: 2.0
    symbol: USD/CHF
  # Disabled 2026-07-06: PF < 1.0 over 6.4y H4 with the frozen config
  # (research/results/h4_yearly_stability_20260705_manifest.json). A book
  # with PF<1 mechanically drags portfolio PF down, so removing it raises
  # the aggregate. Re-enable if forward paper trading proves otherwise.
  - enabled: false            # AUDUSD PF 0.938, maxDD 29% (n=273)
    internal: AUDUSD
    min_score: 55
    rr: 2.0
    symbol: AUD/USD
  - enabled: false            # USDCAD PF 0.954, maxDD 28% (n=282)
    internal: USDCAD
    min_score: 58
    rr: 2.0
    symbol: USD/CAD
  - enabled: false            # NZDUSD PF 0.985 (n=286)
    internal: NZDUSD
    min_score: 60
    rr: 2.0
    symbol: NZD/USD
  - enabled: true
    internal: EURJPY
    min_score: 58
    rr: 2.0
    symbol: EUR/JPY
  - enabled: true
    internal: GBPJPY
    min_score: 60
    rr: 2.0
    symbol: GBP/JPY
  - enabled: true
    internal: AUDJPY
    min_score: 58
    rr: 2.0
    symbol: AUD/JPY
  - enabled: false            # EURGBP PF 0.635, WR 25.8%, maxDD 51% — structurally broken (n=248)
    internal: EURGBP
    min_score: 58
    rr: 2.0
    symbol: EUR/GBP
  - enabled: false            # EURCHF PF 0.951 (n=188)
    internal: EURCHF
    min_score: 58
    rr: 2.0
    symbol: EUR/CHF
  - enabled: true
    internal: XAUUSD
    min_score: 55
    rr: 2.5
    symbol: XAU/USD
  - enabled: true
    internal: XAGUSD
    min_score: 55
    rr: 2.5
    symbol: XAG/USD
  # XAGUSD/USOIL/US30/NAS100/SPX500 are NOT served by Twelve Data Free
  # (404, plan-gated — verified 2026-07-05); the provider failover fetches
  # them from Yahoo Finance automatically (H4 resampled from 1h there).
  - enabled: true
    internal: USOIL
    min_score: 55
    rr: 2.5
    symbol: WTI/USD
  - enabled: true
    internal: US30
    min_score: 55
    rr: 2.5
    symbol: DJI
  - enabled: true
    internal: NAS100
    min_score: 60
    rr: 2.5
    symbol: NDX
  - enabled: true
    internal: SPX500
    min_score: 55
    rr: 2.5
    symbol: SPX
  - enabled: true
    internal: BTCUSD
    min_score: 55
    rr: 2.5
    symbol: BTC/USD
  - enabled: true
    internal: ETHUSD
    min_score: 60
    rr: 2.0
    symbol: ETH/USD
engines:
  enabled:
    divergence: false
    ict: false
    macro: false
    market_structure: false
    nnfx: true
    price_action: true
    quant: false
    sentiment: false
    smc: true
    wyckoff: true
# Order execution. Defaults are SAFE — nothing is placed until you opt in.
#   Layer-2 forward evidence (real orders on the cTrader DEMO account):
#     set ctrader_enabled: true  AND  dry_run: false   (leave the two flags
#     below as-is). Every filled trade then feeds the 100-trade evidence
#     counter with real spread/slippage instead of simulation.
#   allow_live_trading gates REAL-MONEY orders: the executor hard-refuses to
#     trade a non-demo cTrader account unless this is true. Keep it false
#     until forward paper trading proves the edge (audit Phase 5).
execution:
  broker: ctrader
  # LIVE ON DEMO (2026-07-06): collecting real forward-trade evidence on the
  # cTrader demo account (env=demo, $200). Real orders with real spread/
  # slippage feed the 100-trade counter. allow_live_trading stays false, so
  # the executor still hard-refuses any non-demo account. To pause: set
  # dry_run back to true (simulate) or ctrader_enabled back to false.
  ctrader_enabled: true       # true + dry_run:false → real orders on the cTrader demo
  dry_run: false              # false = place real orders (on the demo account)
  allow_live_trading: false   # money-safety gate for LIVE (non-demo) accounts — keep false
  max_open_trades: 5
  # Open-outcome hygiene (philosophy audit, priority 4): force-close any
  # paper signal still open after this many hours, at market, labeled by
  # realized R (win/loss/breakeven). Without it, signals that never touch
  # TP/SL linger forever, saturate the 5% exposure cap (5 × 1% slots) and
  # block every new trade — 39 such rejections observed live. 168h = 7
  # days ≈ 42 H4 bars. 0 disables.
  max_open_trade_hours: 168
  min_score_to_execute: 60.0
  oanda_enabled: false
# On/off switches for real, already-built gates — toggle behavior without
# editing code. This is NOT the feature store (utils/feature_def.py, a
# separate indicator/versioning registry) — different concept, same word.
# Every flag here maps to one real conditional; see the file:line noted.
features:
  market_quality_gate: true      # main.py — MQS gate can block/allow trades
  correlation_filter: true       # scheduler.py — portfolio correlation cap
  ai_weight_suggestions: true    # execution/api_server.py — POST /ai/optimize-weights
fundamentals:
  blackout_look_ahead_min: 60
  news_filter_enabled: true
# Root logger (utils/logger.py). `level` can be overridden per-environment
# via IATIS_LOG_LEVEL. `file` empty = stderr only (the systemd units already
# capture stderr into journald); set a path to ALSO write a rotating file
# (10 MB x 5 backups). These keys used to live, unread, under fundamentals:
# — file logging silently never existed (production audit, Phase 9).
logging:
  level: INFO
  file: ""
# Market Quality Score gate (core/market_quality.py) — session/volatility/
# day-of-week scoring that decides whether conditions are good enough to
# run the engines at all. Already active in every live run; these are its
# two thresholds, previously hardcoded module constants.
market_quality:
  threshold_good: 60    # score >= this => grade GOOD, full size
  threshold_fair: 40    # score >= this => grade FAIR, trade but reduced size; below => NO_TRADE
# Read-only warning thresholds for GET /health/full (execution/api_server.py).
# Purely informational — crossing these does not stop trading, it only
# flips the dashboard's Mission Control status to "degraded".
monitoring:
  ram_warn_pct: 85
  disk_warn_pct: 80
# Portfolio-level correlation cap (risk/correlation_engine.py), already
# enforced in every scheduler.py run — max_per_group was a hardcoded
# module constant before this.
portfolio:
  max_per_group: 2   # max concurrent EXECUTE signals from the same correlation group per run
regime:
  atr_period: 14
  lookback: 100
risk:
  starting_balance: 10000.0   # base equity for realized equity curve / drawdown calc
  max_drawdown_reduce: 0.1
  max_drawdown_stop: 0.15
  max_exposure: 0.05
  min_risk_reward: 2.0
  risk_per_trade_max: 0.01
  risk_per_trade_min: 0.0025
  sl_atr_multiplier: 2.5

# AI explanation/reporting layer (ai/ai_analyzer.py). Explanation-only —
# never feeds final_verdict; the confluence + risk engines decide.
# Opt-in: disabled by default so no external AI API is ever called
# unless deliberately turned on. API key comes from the environment
# (PERPLEXITY_API_KEY / OPENAI_API_KEY / ANTHROPIC_API_KEY), never from
# this file.
ai:
  enabled: true
  provider: perplexity   # perplexity | openai | anthropic
  model: sonar
  temperature: 0.1
  max_tokens: 1200
  timeout: 20
  cache:
    news_ttl_min: 20
    macro_ttl_min: 60
system:
  mode: live
  name: IATIS
  version: 0.4.5
telegram:
  enabled: true
