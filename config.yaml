# =============================================================
# IATIS — Institutional Adaptive Trading Intelligence System
# Master Configuration
# =============================================================

system:
  name: "IATIS"
  version: "0.2.0-phase2"
  mode: "synthetic"   # synthetic | csv | live

data:
  source: "synthetic"          # synthetic | csv | twelve_data
  symbol: "EURUSD"
  # Timeframes to analyze. On Twelve Data Free plan, only M1/M5/M15/H1
  # are natively available — H4/D1 will be resampled from H1 automatically.
  timeframes: ["M15", "H1", "H4", "D1"]
  bars_to_load: 500

  # --- CSV options (used when source: csv) ---
  # csv_path: "data/EURUSD_M1_2026-03-16_2026-06-19.csv"
  # csv_has_header: false
  # csv_separator: "\t"

  # --- Twelve Data options (used when source: twelve_data) ---
  # API key: set here OR in .env as TWELVE_DATA_API_KEY (preferred)
  # twelve_data_api_key: ""
  #
  # Symbol in Twelve Data format (auto-converted from symbol above if not set)
  # e.g. EUR/USD, XAU/USD, BTC/USD
  # twelve_data_symbol: "EUR/USD"
  #
  # Symbols to analyze — each runs a full pipeline per cycle
  # Budget: Free plan = 800 req/day. Each symbol × native_timeframes = credits.
  # With 2 native TFs (M15+H1) per symbol: 20 symbols = 40 req/run
  # Hourly runs: 40 × 24 = 960 req/day — slightly over Free plan (800)
  # Safe schedule: every 2 hours → 40 × 12 = 480 req/day ✅
  # Or: run only enabled symbols (start with 5-8, expand when on paid plan)
  twelve_data_symbols:
    # FOREX Majors
    - {symbol: "EUR/USD",  enabled: true,  internal: "EURUSD"}
    - {symbol: "GBP/USD",  enabled: true,  internal: "GBPUSD"}
    - {symbol: "USD/JPY",  enabled: true,  internal: "USDJPY"}
    - {symbol: "USD/CHF",  enabled: false, internal: "USDCHF"}
    - {symbol: "AUD/USD",  enabled: false, internal: "AUDUSD"}
    - {symbol: "USD/CAD",  enabled: false, internal: "USDCAD"}
    - {symbol: "NZD/USD",  enabled: false, internal: "NZDUSD"}
    - {symbol: "EUR/JPY",  enabled: false, internal: "EURJPY"}
    - {symbol: "GBP/JPY",  enabled: false, internal: "GBPJPY"}
    - {symbol: "AUD/JPY",  enabled: false, internal: "AUDJPY"}
    - {symbol: "EUR/GBP",  enabled: false, internal: "EURGBP"}
    - {symbol: "EUR/CHF",  enabled: false, internal: "EURCHF"}
    # Metals
    - {symbol: "XAU/USD",  enabled: true,  internal: "XAUUSD"}
    - {symbol: "XAG/USD",  enabled: false, internal: "XAGUSD"}
    # Energy
    - {symbol: "WTI/USD",  enabled: false, internal: "USOIL"}
    # Indices
    - {symbol: "DJI",      enabled: false, internal: "US30"}
    - {symbol: "NDX",      enabled: false, internal: "NAS100"}
    - {symbol: "SPX",      enabled: false, internal: "SPX500"}
    # Crypto
    - {symbol: "BTC/USD",  enabled: false, internal: "BTCUSD"}
    - {symbol: "ETH/USD",  enabled: false, internal: "ETHUSD"}

regime:
  atr_period: 14
  lookback: 100

engines:
  enabled:
    smc: true
    ict: true          # RESEARCH status
    nnfx: true         # RESEARCH status
    price_action: true
    quant: true        # RESEARCH status
    wyckoff: true      # RESEARCH status
    macro: false       # requires yfinance + Yahoo Finance access

confluence:
  weights:
    smc: 0.20
    price_action: 0.15
    ict: 0.18
    nnfx: 0.15
    quant: 0.12
    wyckoff: 0.15
    macro: 0.05
  # Max achievable score (all engines at max):
  # SMC=65×0.20 + PA=80×0.15 + ICT=80×0.18 + NNFX=80×0.15 + Quant=60×0.12 + Wyckoff=75×0.15 + Macro=70×0.05
  # = 13 + 12 + 14.4 + 12 + 7.2 + 11.25 + 3.5 = 73.35 (normalized over enabled engines)
  # Setting 62 = ~85% of 73 — requires strong multi-engine agreement
  min_score_to_trade: 62
  min_engines_agreeing: 4   # 6 engines enabled → need 4 agreeing

risk:
  risk_per_trade_min: 0.0025   # 0.25%
  risk_per_trade_max: 0.01     # 1%
  max_exposure: 0.05           # 5%
  min_risk_reward: 3.0         # 1:3
  max_drawdown_reduce: 0.10    # reduce size after 10% DD
  max_drawdown_stop: 0.15      # stop system after 15% DD

logging:
  level: "INFO"
  file: "storage/system.log"

telegram:
  enabled: true
  # Credentials loaded from .env (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
  # Set enabled: false to silence notifications without touching .env
