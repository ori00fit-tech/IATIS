# =============================================================
# IATIS — Institutional Adaptive Trading Intelligence System
# Master Configuration
# =============================================================

system:
  name: "IATIS"
  version: "0.3.1"
  mode: "live"   # synthetic | csv | live

data:
  source: "synthetic"          # synthetic | csv | twelve_data
  symbol: "EURUSD"
  # Timeframes to analyze. On Twelve Data Free plan, only M1/M5/M15/H1
  # are natively available — H4/D1 will be resampled from H1 automatically.
  timeframes: ["M15", "H1", "H4", "D1"]
  bars_to_load: 500

  # --- CSV options (used when source: csv) ---
  # csv_path: "data/EURUSD_M1_2026-03-16_2026-06-19.csv"
  # csv_has_header: false
  # csv_separator: "\t"

  # --- Twelve Data options (used when source: twelve_data) ---
  # API key: set here OR in .env as TWELVE_DATA_API_KEY (preferred)
  # twelve_data_api_key: ""
  #
  # Symbol in Twelve Data format (auto-converted from symbol above if not set)
  # e.g. EUR/USD, XAU/USD, BTC/USD
  # twelve_data_symbol: "EUR/USD"
  #
  # Symbols to analyze — each runs a full pipeline per cycle
  # Budget: 20 symbols × 2 TF = 40 req/run
  # Every 2hr: 40 × 12 = 480 req/day ✅ (well within 800 Free plan)
  # Scheduler runs: python3 scheduler.py --interval 120
  twelve_data_symbols:
    # FOREX Majors
    - {symbol: "EUR/USD",  enabled: true,  internal: "EURUSD"}
    - {symbol: "GBP/USD",  enabled: true,  internal: "GBPUSD"}
    - {symbol: "USD/JPY",  enabled: true,  internal: "USDJPY"}
    - {symbol: "USD/CHF",  enabled: true,  internal: "USDCHF"}
    - {symbol: "AUD/USD",  enabled: true,  internal: "AUDUSD"}
    - {symbol: "USD/CAD",  enabled: true,  internal: "USDCAD"}
    - {symbol: "NZD/USD",  enabled: true,  internal: "NZDUSD"}
    - {symbol: "EUR/JPY",  enabled: true,  internal: "EURJPY"}
    - {symbol: "GBP/JPY",  enabled: false, internal: "GBPJPY"}  # POOR WR=45.8%
    - {symbol: "AUD/JPY",  enabled: true,  internal: "AUDJPY"}
    - {symbol: "EUR/GBP",  enabled: true,  internal: "EURGBP"}
    - {symbol: "EUR/CHF",  enabled: true,  internal: "EURCHF"}
    # Metals
    - {symbol: "XAU/USD",  enabled: true,  internal: "XAUUSD"}
    - {symbol: "XAG/USD",  enabled: true,  internal: "XAGUSD"}   # Yahoo Finance via failover
    # Energy
    - {symbol: "WTI/USD",  enabled: true,  internal: "USOIL"}    # Yahoo Finance ✅
    # Indices
    - {symbol: "DJI",      enabled: true,  internal: "US30"}     # Yahoo Finance ✅
    - {symbol: "NDX",      enabled: true,  internal: "NAS100"}   # Yahoo Finance ✅
    - {symbol: "SPX",      enabled: true,  internal: "SPX500"}   # Yahoo Finance ✅
    # Crypto
    - {symbol: "BTC/USD",  enabled: true,  internal: "BTCUSD"}
    - {symbol: "ETH/USD",  enabled: true,  internal: "ETHUSD"}

regime:
  atr_period: 14
  lookback: 100

engines:
  enabled:
    smc: true
    ict: true
    nnfx: true
    price_action: true
    quant: true
    wyckoff: true
    divergence: true        # NEW: RSI/MACD divergence detection
    market_structure: true  # NEW: BOS/CHoCH/MSS structural events
    sentiment: true         # NEW: COT + retail positioning proxy
    macro: false

confluence:
  weights:
    # Data-driven weights (updated 2026-06-25 from engine_tracker 292 votes):
    # Blend: 70% data-driven contribution + 30% prior weights
    # Constraints: min=0.05, max=0.35
    #
    # Engine contribution scores (agreement × active_rate × avg_score):
    #   NNFX: 0.491  ← highest (agreement=84.7%, avg_score=58)
    #   PA:   0.368  ← strong (agreement=89.8%, always votes)
    #   SMC:  0.316  ← reliable (agreement=97.0%)
    #   Quant: 0.126 ← moderate confirmation
    #   ICT:  0.084  ← low (was contrarian before trend filter fix)
    #   Wyckoff: 0.040 ← lowest (high neutral rate 37.7%)
    smc:              0.200  # reduced to make room for new engines
    price_action:     0.185  # reduced
    ict:              0.065  # reduced
    nnfx:             0.225  # NNFX still highest (data-driven)
    quant:            0.070
    wyckoff:          0.040
    divergence:       0.100  # NEW: RSI/MACD divergence
    market_structure: 0.085  # NEW: BOS/CHoCH/MSS
    sentiment:        0.030  # NEW: low until COT integrated
    macro:            0.000
  # Max achievable score (re-normalized over participating engines):
  # Best realistic case: SMC(65)×0.30 + PA(80)×0.25 + NNFX(80)×0.15 agree
  # participating_weight = 0.70 → score = (65×0.30+80×0.25+80×0.15)/0.70 = 72.1
  # With 2 engines (SMC+PA only): (65×0.30+80×0.25)/0.55 = 71.8
  # Setting 55 = ~77% of max → realistic threshold
  min_score_to_trade: 55
  # With 6 engines, 2-3 typically agree (others NEUTRAL)
  # Setting 2 allows SMC+PA to trade, which is the current proven combo
  min_engines_agreeing: 2

risk:
  risk_per_trade_min: 0.0025   # 0.25%
  risk_per_trade_max: 0.01     # 1%
  max_exposure: 0.05           # 5%
  min_risk_reward: 3.0         # 1:3
  max_drawdown_reduce: 0.10    # reduce size after 10% DD
  max_drawdown_stop: 0.15      # stop system after 15% DD

fundamentals:
  # News Intelligence Layer — requires JBLANKED_API_KEY in .env
  # Register free: https://www.jblanked.com/
  # Fallback: Forex Factory public JSON (no key needed, week data only)
  news_filter_enabled: true
  blackout_look_ahead_min: 60    # check for events in next 60 minutes
  # Blackout windows (automatic NO_TRADE):
  #   30 min BEFORE high-impact event (NFP, FOMC, CPI, rate decisions)
  #   15 min AFTER high-impact event
  #   10 min BEFORE medium-impact event
  level: "INFO"
  file: "storage/system.log"

telegram:
  enabled: true
  # Credentials loaded from .env (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
  # Set enabled: false to silence notifications without touching .env

execution:
  # ─── OANDA Paper/Live Trading ───────────────────────────────────────────────
  # Setup:
  #   1. Register free at https://www.oanda.com/
  #   2. Create Practice (demo) account
  #   3. Manage API Access → Generate token
  #   4. Add to .env:
  #        OANDA_API_KEY=your_token
  #        OANDA_ACCOUNT_ID=101-001-XXXXXXX-001
  #        OANDA_ENVIRONMENT=practice
  oanda_enabled: false    # true after adding OANDA credentials to .env
  dry_run: true           # true=log only | false=place orders on OANDA
  max_open_trades: 5      # maximum concurrent open positions
  min_score_to_execute: 60.0  # extra safety above confluence.min_score_to_trade

  # ─── cTrader / IC Markets (Recommended for Morocco) ─────────────────────────
  broker: "ctrader"     # "ctrader" or "oanda"
  ctrader_enabled: false
  # Setup:
  #   1. Demo account: https://www.icmarkets.com/ar/open-trading-account/demo/
  #      Choose: cTrader Demo
  #   2. cTrader → Settings → API → Create Application
  #      App Name: IATIS, Redirect URI: http://localhost
  #      → Copy Client ID + Client Secret
  #   3. Add to .env:
  #        CTRADER_CLIENT_ID=12345
  #        CTRADER_CLIENT_SECRET=abcdef
  #        CTRADER_ACCOUNT_ID=your_numeric_id
  #        CTRADER_ACCESS_TOKEN=your_token
  #        CTRADER_ENVIRONMENT=demo
  #
  # Recommended leverage for IATIS (1% risk, 1:3 RR):
  #   FX Majors:    1:30 to 1:50  (safe)
  #   Gold/Silver:  1:20           (volatile)
  #   Oil/Indices:  1:20           (volatile)
  #   Crypto:       1:5 to 1:10  (high risk)
