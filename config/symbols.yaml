# config/symbols.yaml — Symbol Universe & Governance Record
# -----------------------------------------------------------------------
# Split out of config.yaml (2026-07-12) so the symbol universe can grow
# without turning the master file into an unreadable wall. Loaded and
# merged into `data.twelve_data_symbols` by utils/helpers.py::load_config()
# — the effective in-memory config is unchanged; only the file layout is.
#
# CODE READS ONLY: enabled, internal, min_score, rr, symbol.
# Every other field below (asset_class, status, status_reason,
# status_since) is governance metadata for humans — it is NOT read by
# main.py, scheduler.py, execution/, or risk/. Changing it changes
# nothing about what trades. This is deliberate: CLAUDE.md forbids
# changing entries/exits/thresholds mid-sample (the forward-evidence
# counter is at 6/100 closed trades as of this writing), so this upgrade
# adds *explanation*, not new decision logic.
#
# status values (descriptive only — `enabled` is what scheduler.py
# actually obeys):
#   ACTIVE        — enabled, trading now, no disqualifying evidence.
#   PAUSED        — disabled after measured evidence (PF/WR/maxDD) fell
#                    short; can be revisited if re-measured favorably.
#   RETIRED       — disabled, structurally broken (not just marginal);
#                    would need a new pre-registered hypothesis to revisit.
#   WATCHLIST     — not yet in the universe; candidate under
#                    consideration, no live data collected.
#   EXPERIMENTAL  — enabled but explicitly outside the measured edge
#                    (carriers @ H4/D1); demo-only, evidence still forming.
#
# status_since: the date this governance record's status/reason was last
# confirmed correct against research/results + docs/STRATEGY_EVIDENCE.
# It is NOT a claim about when the underlying trading decision was
# originally made — those dates predate this file and are recorded in
# the PF/WR/maxDD comments themselves and in docs/STRATEGY_EVIDENCE_2026-07.md.

